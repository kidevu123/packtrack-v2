{% extends "base.html" %}
{% block title %}Sign in · PackTrack{% endblock %}
{% block container_class %}max-w-md{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto pt-16">
  <div class="text-center mb-8">
    <div class="size-12 mx-auto rounded-xl bg-stone-900 text-white grid place-items-center text-lg font-semibold">PT</div>
    <h1 class="mt-4 text-xl font-medium">PackTrack</h1>
  </div>
  <form method="post" action="/login" class="bg-white border border-stone-200 rounded-xl p-6 space-y-4">
    <input type="hidden" name="next" value="{{ next }}" />
    {% if error %}<p class="text-sm text-red-600">{{ error }}</p>{% endif %}
    <label class="block">
      <span class="text-xs text-stone-500">Email</span>
      <input name="email" type="email" required autofocus class="mt-1 w-full rounded-lg border-stone-300 focus:border-stone-900 focus:ring-stone-900" />
    </label>
    <label class="block">
      <span class="text-xs text-stone-500">Password</span>
      <input name="password" type="password" required class="mt-1 w-full rounded-lg border-stone-300 focus:border-stone-900 focus:ring-stone-900" />
    </label>
    <button class="w-full rounded-lg bg-stone-900 text-white py-2 font-medium hover:bg-stone-800">
      Sign in
    </button>
  </form>

  {% if oidc_configured %}
  <div style="margin-top:16px;text-align:center;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <hr style="flex:1;border:none;border-top:1px solid #e7e5e4;">
      <span style="font-size:12px;color:#a8a29e;">or</span>
      <hr style="flex:1;border:none;border-top:1px solid #e7e5e4;">
    </div>
    <a href="/auth/sso?next={{ next | urlencode }}"
       style="display:block;width:100%;box-sizing:border-box;padding:9px 0;border-radius:10px;border:1px solid #d6d3d1;background:white;font-size:14px;font-weight:500;color:#1c1917;text-decoration:none;text-align:center;">
      Sign in with SSO
    </a>
  </div>
  {% endif %}
</div>
{% endblock %}
